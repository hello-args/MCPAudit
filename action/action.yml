name: MCTS Security Scan
description: Scan an MCP server for security vulnerabilities with JSON, SARIF, and HTML outputs
branding:
  icon: shield
  color: red

inputs:
  target:
    description: Path to MCP server entrypoint or repository directory
    required: true
    default: ./server.py
  fail-on-critical:
    description: Fail the workflow if critical findings exist
    required: false
    default: "true"
  min-score:
    description: Fail if security score is below this value (0-100). Leave empty to skip.
    required: false
    default: ""
  extras:
    description: >
      Comma-separated pyproject optional extras (mcp, sast, supplychain, yara,
      llm, semgrep, api, all). Default installs mcp and sast for live probe and
      tree-sitter SAST.
    required: false
    default: "mcp,sast"

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.12"
        enable-cache: true

    - name: Install MCTS
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: |
        set -euo pipefail
        EXTRAS="${{ inputs.extras }}"
        if [ "$EXTRAS" = "all" ]; then
          uv sync --frozen --no-dev --all-extras
        else
          ARGS=()
          IFS=',' read -ra PARTS <<< "$EXTRAS"
          for extra in "${PARTS[@]}"; do
            trimmed="$(echo "$extra" | xargs)"
            if [ -n "$trimmed" ]; then
              ARGS+=(--extra "$trimmed")
            fi
          done
          uv sync --frozen --no-dev "${ARGS[@]}"
        fi

    - name: Run security scan
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: |
        set -euo pipefail
        TARGET="${{ inputs.target }}"
        JSON_OUT="${{ github.workspace }}/mcts-report.json"
        SARIF_OUT="${{ github.workspace }}/mcts-report.sarif"
        ARGS=(scan "$TARGET" --no-progress -o "$JSON_OUT")

        if [ "${{ inputs.fail-on-critical }}" = "true" ]; then
          ARGS+=(--fail-on-critical)
        fi
        if [ -n "${{ inputs.min-score }}" ]; then
          ARGS+=(--min-score "${{ inputs.min-score }}")
        fi

        uv run mcts "${ARGS[@]}"
        uv run mcts scan "$TARGET" --no-progress --format sarif -o "$SARIF_OUT"

    - name: Generate HTML dashboard
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: uv run mcts report "${{ github.workspace }}/mcts-report.json" -o "${{ github.workspace }}/mcts-report.html"

    - name: Upload JSON report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mcts-report-json
        path: mcts-report.json

    - name: Upload HTML dashboard
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mcts-report-html
        path: mcts-report.html
